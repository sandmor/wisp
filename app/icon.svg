<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="wispCore" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#d2f0ff" />
      <stop offset="60%" stop-color="#8cc8ff" stop-opacity="0.85" />
      <stop offset="90%" stop-color="#64a0ff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#64a0ff" stop-opacity="0" />
    </radialGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <circle cx="60" cy="60" r="32" fill="url(#wispCore)" filter="url(#glow)" />
</svg>
